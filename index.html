<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mi Tarjeta">
<meta name="theme-color" content="#0a0a0a">
<title>Mi Tarjeta</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --surface2: #1c1c1c;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f0f0f0;
    --text2: #888;
    --text3: #555;
    --green: #34d399;
    --green-dim: rgba(52,211,153,0.12);
    --amber: #fbbf24;
    --amber-dim: rgba(251,191,36,0.12);
    --red: #f87171;
    --red-dim: rgba(248,113,113,0.12);
    --safe: #34d399;
    --radius: 18px;
    --radius-sm: 12px;
    --mono: 'DM Mono', monospace;
    --sans: 'DM Sans', sans-serif;
    --safe-top: env(safe-area-inset-top, 44px);
    --safe-bottom: env(safe-area-inset-bottom, 20px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 16px;
    min-height: 100dvh;
    overscroll-behavior: none;
  }

  #app {
    max-width: 430px;
    margin: 0 auto;
    padding: calc(var(--safe-top) + 16px) 18px calc(var(--safe-bottom) + 80px);
    min-height: 100dvh;
  }

  /* Header */
  .app-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }
  .app-title {
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text2);
  }
  .month-badge {
    font-size: 12px;
    color: var(--text2);
    background: var(--surface);
    border: 0.5px solid var(--border);
    padding: 5px 12px;
    border-radius: 99px;
    font-family: var(--mono);
  }

  /* Balance card */
  .balance-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 24px 24px 20px;
    margin-bottom: 14px;
    position: relative;
    overflow: hidden;
  }
  .balance-card::before {
    content: '';
    position: absolute;
    top: -60px; right: -60px;
    width: 180px; height: 180px;
    border-radius: 50%;
    background: var(--glow, rgba(52,211,153,0.06));
    pointer-events: none;
    transition: background 0.5s;
  }

  .bal-label { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text3); margin-bottom: 6px; }
  .bal-amount {
    font-family: var(--mono);
    font-size: 42px;
    font-weight: 400;
    letter-spacing: -0.02em;
    color: var(--text);
    line-height: 1;
    transition: color 0.3s;
  }
  .bal-currency { font-size: 20px; color: var(--text2); margin-right: 2px; }

  .progress-section { margin-top: 20px; }
  .progress-track {
    height: 3px;
    background: var(--border2);
    border-radius: 99px;
    overflow: hidden;
    margin-bottom: 10px;
  }
  .progress-fill {
    height: 100%;
    border-radius: 99px;
    transition: width 0.5s cubic-bezier(0.4,0,0.2,1), background 0.3s;
  }
  .progress-labels {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    font-family: var(--mono);
  }
  .prog-spent { color: var(--text2); }
  .prog-pct { }

  /* Alert */
  .alert {
    border-radius: var(--radius-sm);
    padding: 12px 16px;
    font-size: 13px;
    line-height: 1.5;
    margin-bottom: 14px;
    border: 0.5px solid;
    display: none;
  }
  .alert.visible { display: block; }
  .alert-warning { background: var(--amber-dim); border-color: rgba(251,191,36,0.25); color: var(--amber); }
  .alert-danger { background: var(--red-dim); border-color: rgba(248,113,113,0.25); color: var(--red); }

  /* Stats row */
  .stats-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 14px; }
  .stat-box {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 14px 12px;
    text-align: center;
  }
  .stat-num { font-family: var(--mono); font-size: 17px; font-weight: 500; color: var(--text); }
  .stat-lbl { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text3); margin-top: 3px; }

  /* Tab bar */
  .tab-bar {
    position: fixed;
    bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 430px;
    display: flex;
    background: rgba(10,10,10,0.9);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-top: 0.5px solid var(--border);
    padding-bottom: var(--safe-bottom);
  }
  .tab-btn {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    padding: 10px 0 6px;
    background: none; border: none; cursor: pointer;
    color: var(--text3); font-family: var(--sans); font-size: 10px;
    letter-spacing: 0.05em; text-transform: uppercase; gap: 4px;
    transition: color 0.2s;
  }
  .tab-btn.active { color: var(--green); }
  .tab-icon { font-size: 20px; line-height: 1; }

  /* Views */
  .view { display: none; }
  .view.active { display: block; }

  /* Section title */
  .sec-title {
    font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--text3); margin-bottom: 12px; margin-top: 4px;
  }

  /* Transaction list */
  .tx-list { display: flex; flex-direction: column; gap: 8px; }
  .tx-item {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 13px 16px;
    display: flex;
    align-items: center;
    gap: 13px;
    animation: slideIn 0.2s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .tx-emoji { font-size: 22px; flex-shrink: 0; width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; background: var(--surface2); border-radius: 10px; }
  .tx-body { flex: 1; min-width: 0; }
  .tx-desc { font-size: 14px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tx-sub { font-size: 11px; color: var(--text3); margin-top: 2px; font-family: var(--mono); }
  .tx-right { text-align: right; flex-shrink: 0; }
  .tx-amount { font-family: var(--mono); font-size: 15px; color: var(--red); font-weight: 500; }
  .tx-del { display: block; font-size: 11px; color: var(--text3); background: none; border: none; cursor: pointer; font-family: var(--sans); margin-top: 4px; text-align: right; }
  .tx-del:hover { color: var(--red); }

  .empty-msg { text-align: center; padding: 48px 24px; color: var(--text3); font-size: 14px; }
  .empty-icon { font-size: 32px; margin-bottom: 10px; }

  /* Add form */
  .add-form {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
  }

  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text3); margin-bottom: 7px; }

  .field input, .field select {
    width: 100%;
    background: var(--surface2);
    border: 0.5px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 15px;
    padding: 13px 14px;
    -webkit-appearance: none;
    appearance: none;
    outline: none;
    transition: border-color 0.2s;
  }
  .field input:focus, .field select:focus { border-color: var(--border2); }
  .field input::placeholder { color: var(--text3); }
  .field input[type="number"] { font-family: var(--mono); font-size: 28px; padding: 12px 14px; letter-spacing: -0.01em; }

  .cat-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }
  .cat-btn {
    background: var(--surface2);
    border: 0.5px solid var(--border);
    border-radius: 12px;
    padding: 10px 4px 8px;
    display: flex; flex-direction: column; align-items: center; gap: 5px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
  }
  .cat-btn.selected {
    border-color: var(--green);
    background: var(--green-dim);
  }
  .cat-btn-icon { font-size: 20px; }
  .cat-btn-lbl { font-size: 9px; color: var(--text2); letter-spacing: 0.04em; }

  .submit-btn {
    width: 100%;
    padding: 15px;
    background: var(--green);
    color: #0a0a0a;
    border: none;
    border-radius: 14px;
    font-family: var(--sans);
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    margin-top: 6px;
    letter-spacing: 0.02em;
    transition: opacity 0.15s, transform 0.1s;
  }
  .submit-btn:active { opacity: 0.85; transform: scale(0.98); }

  /* Limit settings */
  .settings-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 14px;
  }
  .settings-title { font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 4px; }
  .settings-sub { font-size: 12px; color: var(--text3); margin-bottom: 16px; }

  .reset-btn {
    width: 100%;
    padding: 14px;
    background: none;
    border: 0.5px solid var(--border2);
    border-radius: 14px;
    color: var(--red);
    font-family: var(--sans);
    font-size: 14px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .reset-btn:hover { background: var(--red-dim); }
</style>
</head>
<body>

<div id="app">
  <div class="app-header">
    <div class="app-title">Mi Tarjeta</div>
    <div class="month-badge" id="month-label">—</div>
  </div>

  <!-- VIEW: INICIO -->
  <div class="view active" id="view-home">
    <div class="alert" id="alert-box"></div>

    <div class="balance-card" id="balance-card">
      <div class="bal-label">Saldo disponible</div>
      <div class="bal-amount"><span class="bal-currency">$</span><span id="bal-val">0.00</span></div>
      <div class="progress-section">
        <div class="progress-track">
          <div class="progress-fill" id="prog-fill" style="width:0%"></div>
        </div>
        <div class="progress-labels">
          <span class="prog-spent" id="prog-spent">$0.00 usado</span>
          <span id="prog-pct" style="font-family:var(--mono); font-size:12px; color:var(--text2);">0%</span>
        </div>
      </div>
    </div>

    <div class="stats-row">
      <div class="stat-box">
        <div class="stat-num" id="stat-count">0</div>
        <div class="stat-lbl">Consumos</div>
      </div>
      <div class="stat-box">
        <div class="stat-num" id="stat-avg">$0</div>
        <div class="stat-lbl">Promedio</div>
      </div>
      <div class="stat-box">
        <div class="stat-num" id="stat-limit">$1000</div>
        <div class="stat-lbl">Cupo</div>
      </div>
    </div>

    <div class="sec-title">Últimos movimientos</div>
    <div class="tx-list" id="recent-list"></div>
  </div>

  <!-- VIEW: HISTORIAL -->
  <div class="view" id="view-history">
    <div class="sec-title">Todos los consumos</div>
    <div class="tx-list" id="full-list"></div>
  </div>

  <!-- VIEW: AGREGAR -->
  <div class="view" id="view-add">
    <div class="add-form">
      <div class="field">
        <label>Monto ($)</label>
        <input type="number" id="inp-amount" placeholder="0.00" min="0" step="0.01" inputmode="decimal">
      </div>

      <div class="field">
        <label>Categoría</label>
        <div class="cat-grid" id="cat-grid"></div>
      </div>

      <div class="field">
        <label>Descripción</label>
        <input type="text" id="inp-desc" placeholder="ej. Supermaxi, almuerzo...">
      </div>

      <button class="submit-btn" onclick="addTx()">Registrar consumo</button>
    </div>
  </div>

  <!-- VIEW: AJUSTES -->
  <div class="view" id="view-settings">
    <div class="settings-card">
      <div class="settings-title">Cupo mensual</div>
      <div class="settings-sub">Ajusta el límite de tu tarjeta</div>
      <div class="field">
        <input type="number" id="inp-limit" placeholder="1000" min="1" step="1" inputmode="decimal">
      </div>
      <button class="submit-btn" onclick="saveLimit()">Guardar cupo</button>
    </div>

    <div class="settings-card">
      <div class="settings-title">Reiniciar mes</div>
      <div class="settings-sub">Borra todos los consumos del período actual</div>
      <button class="reset-btn" onclick="resetMonth()">Borrar todos los consumos</button>
    </div>
  </div>
</div>

<!-- TAB BAR -->
<div class="tab-bar">
  <button class="tab-btn active" onclick="showView('home', this)">
    <span class="tab-icon">◉</span>Inicio
  </button>
  <button class="tab-btn" onclick="showView('add', this)">
    <span class="tab-icon">＋</span>Agregar
  </button>
  <button class="tab-btn" onclick="showView('history', this)">
    <span class="tab-icon">≡</span>Historial
  </button>
  <button class="tab-btn" onclick="showView('settings', this)">
    <span class="tab-icon">⚙</span>Ajustes
  </button>
</div>

<script>
const CATS = [
  { emoji: '🛒', label: 'Mercado' },
  { emoji: '🍔', label: 'Comida' },
  { emoji: '⛽', label: 'Gasolina' },
  { emoji: '💊', label: 'Salud' },
  { emoji: '🎉', label: 'Ocio' },
  { emoji: '👗', label: 'Ropa' },
  { emoji: '🏠', label: 'Hogar' },
  { emoji: '📱', label: 'Tecno' },
  { emoji: '✈️', label: 'Viajes' },
  { emoji: '🏫', label: 'Educación' },
  { emoji: '🐾', label: 'Mascotas' },
  { emoji: '📦', label: 'Otro' },
];

let selectedCat = 0;
let txs = [];
let limit = 1000;

function load() {
  try {
    const d = JSON.parse(localStorage.getItem('mitarjeta_v2'));
    if (d) { txs = d.txs || []; limit = d.limit || 1000; }
  } catch {}
}
function persist() {
  try { localStorage.setItem('mitarjeta_v2', JSON.stringify({ txs, limit })); } catch {}
}
function fmt(n) { return n.toLocaleString('es-EC', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }

function buildCatGrid() {
  const grid = document.getElementById('cat-grid');
  grid.innerHTML = CATS.map((c, i) => `
    <button class="cat-btn${i === 0 ? ' selected' : ''}" onclick="selectCat(${i})">
      <span class="cat-btn-icon">${c.emoji}</span>
      <span class="cat-btn-lbl">${c.label}</span>
    </button>
  `).join('');
}

function selectCat(i) {
  selectedCat = i;
  document.querySelectorAll('.cat-btn').forEach((b, idx) => b.classList.toggle('selected', idx === i));
}

function getMonthLabel() {
  return new Date().toLocaleDateString('es-EC', { month: 'long', year: 'numeric' });
}

function render() {
  const total = txs.reduce((s, t) => s + t.amount, 0);
  const balance = limit - total;
  const pct = Math.min(100, total / limit * 100);

  document.getElementById('month-label').textContent = getMonthLabel();
  document.getElementById('bal-val').textContent = fmt(Math.max(0, balance));
  document.getElementById('stat-count').textContent = txs.length;
  document.getElementById('stat-avg').textContent = txs.length ? '$' + Math.round(total / txs.length) : '$0';
  document.getElementById('stat-limit').textContent = '$' + Math.round(limit);
  document.getElementById('inp-limit').placeholder = limit;

  const fill = document.getElementById('prog-fill');
  fill.style.width = pct.toFixed(1) + '%';
  let color, glow;
  if (pct >= 90) { color = '#f87171'; glow = 'rgba(248,113,113,0.08)'; }
  else if (pct >= 70) { color = '#fbbf24'; glow = 'rgba(251,191,36,0.08)'; }
  else { color = '#34d399'; glow = 'rgba(52,211,153,0.06)'; }
  fill.style.background = color;
  document.getElementById('balance-card').style.setProperty('--glow', glow);

  document.getElementById('prog-spent').textContent = '$' + fmt(total) + ' usado';
  document.getElementById('prog-pct').textContent = Math.round(pct) + '%';
  document.getElementById('prog-pct').style.color = color;

  const alertBox = document.getElementById('alert-box');
  if (balance < 0) {
    alertBox.className = 'alert alert-danger visible';
    alertBox.textContent = '⚠ Cupo agotado. Has superado el límite en $' + fmt(Math.abs(balance)) + '.';
  } else if (pct >= 80) {
    alertBox.className = 'alert alert-warning visible';
    alertBox.textContent = '⚡ Usaste el ' + Math.round(pct) + '% del cupo. Te quedan $' + fmt(balance) + '.';
  } else {
    alertBox.className = 'alert';
  }

  renderList('recent-list', txs.slice().reverse().slice(0, 5));
  renderList('full-list', txs.slice().reverse());
}

function txHTML(t, realIdx) {
  const cat = CATS[t.catIdx] || CATS[CATS.length - 1];
  const d = new Date(t.date);
  const dateStr = d.toLocaleDateString('es-EC', { day: '2-digit', month: 'short' }) + ' ' + d.toLocaleTimeString('es-EC', { hour: '2-digit', minute: '2-digit' });
  return `<div class="tx-item">
    <div class="tx-emoji">${cat.emoji}</div>
    <div class="tx-body">
      <div class="tx-desc">${t.desc || cat.label}</div>
      <div class="tx-sub">${cat.label} · ${dateStr}</div>
    </div>
    <div class="tx-right">
      <div class="tx-amount">-$${fmt(t.amount)}</div>
      <button class="tx-del" onclick="deleteTx(${realIdx})">eliminar</button>
    </div>
  </div>`;
}

function renderList(id, items) {
  const el = document.getElementById(id);
  if (!items.length) {
    el.innerHTML = '<div class="empty-msg"><div class="empty-icon">💳</div>Sin consumos registrados</div>';
    return;
  }
  const reversed = txs.slice().reverse();
  el.innerHTML = items.map(t => {
    const realIdx = txs.indexOf(t);
    return txHTML(t, realIdx);
  }).join('');
}

function addTx() {
  const raw = parseFloat(document.getElementById('inp-amount').value);
  if (!raw || raw <= 0) { document.getElementById('inp-amount').focus(); return; }
  const amount = Math.round(raw * 100) / 100;
  const desc = document.getElementById('inp-desc').value.trim();
  txs.push({ amount, catIdx: selectedCat, desc, date: Date.now() });
  persist();
  document.getElementById('inp-amount').value = '';
  document.getElementById('inp-desc').value = '';
  render();
  showView('home', document.querySelector('.tab-btn'));
}

function deleteTx(idx) {
  if (confirm('¿Eliminar este consumo?')) {
    txs.splice(idx, 1);
    persist();
    render();
  }
}

function saveLimit() {
  const v = parseFloat(document.getElementById('inp-limit').value);
  if (v && v > 0) { limit = v; persist(); render(); alert('Cupo actualizado a $' + fmt(limit)); }
}

function resetMonth() {
  if (confirm('¿Borrar todos los consumos del mes?')) {
    txs = [];
    persist();
    render();
    showView('home', document.querySelector('.tab-btn'));
  }
}

function showView(name, btn) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  if (btn) btn.classList.add('active');
}

load();
buildCatGrid();
render();
</script>
</body>
</html>
